name: Refresh dashboard data

on:
  schedule:
    - cron: '0 * * * *'      # every hour, on the hour (UTC)
  workflow_dispatch: {}       # allow manual "Run workflow" button

permissions:
  contents: write             # needed to commit data.json back

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull CleverTap events -> data.json
        env:
          CLEVERTAP_ACCOUNT:  ${{ secrets.CLEVERTAP_ACCOUNT }}
          CLEVERTAP_PASSCODE: ${{ secrets.CLEVERTAP_PASSCODE }}
          CLEVERTAP_REGION:   ${{ secrets.CLEVERTAP_REGION }}
        run: python fetch_ct_data.py

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json — nothing to commit."
          else
            git add data.json
            git commit -m "auto: hourly dashboard data refresh [skip ci]"
            git push
          fi
